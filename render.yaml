services:
  - type: web
    name: auction-platform
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: auction-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: auction-db
    plan: free
