services:
  - type: web
    name: auction-platform
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: auction-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
    # Connect the database if you create one via Render Blueprint
    # (Uncomment the database section below if you want Render to create it for you)

# databases:
#   - name: auction-db
#     plan: free
